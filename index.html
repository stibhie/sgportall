<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office of the Treasurer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0b1220;
    --navy-mid: #111d2e;
    --navy-card: #162035;
    --navy-border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8eaf0;
    --text-muted: #7c8ba1;
    --text-soft: #b0bac9;
    --white: #ffffff;
    --success: #3ecf8e;
    --warning: #f5a623;
    --info: #4a9eff;
    --sans: 'Inter', system-ui, sans-serif;
    --serif: 'Playfair Display', Georgia, serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,18,32,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--navy-border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--gold);
    letter-spacing: 0.01em;
    text-decoration: none;
  }
  .nav-logo-img {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold-light); }

  /* HERO */
  .hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6rem 2rem 4rem;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(74,158,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .hero-content {
    position: relative;
    max-width: 780px;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 32px;
    height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(42px, 7vw, 78px);
    font-weight: 900;
    line-height: 1.05;
    color: var(--white);
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--gold);
  }
  .hero-sub {
    font-size: 18px;
    color: var(--text-soft);
    max-width: 520px;
    margin-bottom: 2.5rem;
    font-weight: 300;
    line-height: 1.65;
  }
  .hero-cta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: #0b1220;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 13px 28px;
    border-radius: 4px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-ghost {
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 13px 28px;
    border-radius: 4px;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold-light); }

  /* STAT BAR */
  .stat-bar {
    background: var(--navy-card);
    border-top: 1px solid var(--navy-border);
    border-bottom: 1px solid var(--navy-border);
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0;
  }
  .stat-item {
    padding: 1rem 2rem;
    border-right: 1px solid var(--navy-border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-number {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  /* SECTION COMMONS */
  section { padding: 5rem 2rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .section-desc {
    font-size: 16px;
    color: var(--text-soft);
    max-width: 560px;
    line-height: 1.7;
    font-weight: 300;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--navy-border);
    margin: 0;
  }

  /* BUDGET SECTION */
  .budget-section { background: var(--navy-mid); }
  .budget-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-top: 3rem;
    align-items: start;
  }
  .budget-bars { display: flex; flex-direction: column; gap: 14px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bar-dept {
    width: 100px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease;
  }
  .bar-amt {
    width: 80px;
    font-size: 12px;
    color: var(--text-soft);
    flex-shrink: 0;
    text-align: right;
  }
  .budget-summary {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    padding: 2rem;
  }
  .budget-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--navy-border);
    font-size: 14px;
  }
  .budget-summary-row:last-child { border-bottom: none; }
  .budget-summary-row .label { color: var(--text-muted); }
  .budget-summary-row .val { color: var(--white); font-weight: 500; }
  .budget-summary-row .val.gold { color: var(--gold); }
  .budget-summary-row .val.success { color: var(--success); }
  .progress-bar-outer {
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    height: 6px;
    margin-top: 1.2rem;
  }
  .progress-bar-inner {
    height: 6px;
    border-radius: 99px;
    background: linear-gradient(90deg, #c9a84c, #e8c97a);
    width: 64%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* TIMELINE SECTION */
  .timeline { position: relative; margin-top: 3.5rem; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--navy-border);
  }
  .timeline-item {
    display: flex;
    gap: 2rem;
    margin-bottom: 2.5rem;
    position: relative;
  }
  .timeline-dot {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--navy-border);
    background: var(--navy-card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .timeline-dot.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }
  .timeline-dot.done {
    background: rgba(62,207,142,0.1);
    border-color: var(--success);
    color: var(--success);
  }
  .timeline-body { padding-top: 6px; }
  .timeline-status {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .timeline-status.active { color: var(--gold); }
  .timeline-status.done { color: var(--success); }
  .timeline-status.upcoming { color: var(--text-muted); }
  .timeline-title { font-size: 15px; font-weight: 500; color: var(--white); margin-bottom: 4px; }
  .timeline-date { font-size: 12px; color: var(--text-muted); }

  /* AUDIT TABLE */
  .audit-section { background: var(--navy-mid); }
  .audit-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 2.5rem;
    font-size: 14px;
  }
  .audit-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--navy-border);
    font-weight: 500;
  }
  .audit-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--navy-border);
    color: var(--text-soft);
    vertical-align: middle;
  }
  .audit-table tr:last-child td { border-bottom: none; }
  .audit-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
  }
  .pill-complete { background: rgba(62,207,142,0.12); color: var(--success); }
  .pill-review { background: rgba(74,158,255,0.12); color: var(--info); }
  .pill-pending { background: rgba(245,166,35,0.12); color: var(--warning); }
  .pill-none { background: rgba(255,255,255,0.05); color: var(--text-muted); }
  .dl-link {
    font-size: 12px;
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .dl-link:hover { color: var(--gold-light); text-decoration: underline; }

  /* PROGRAMS GRID */
  .programs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 3rem;
  }
  .program-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }
  .program-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-2px);
  }
  .program-icon {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    background: var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    font-size: 16px;
  }
  .program-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
  }
  .program-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 1rem;
  }
  .program-budget {
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    font-family: var(--serif);
  }
  .program-budget-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* FOOTER */
  footer {
    background: #070e1a;
    border-top: 1px solid var(--navy-border);
    padding: 4rem 2rem 2rem;
  }
  .footer-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 3rem;
    margin-bottom: 3rem;
  }
  .footer-brand-name {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .footer-brand-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 280px;
  }
  .footer-col-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 8px; }
  .footer-col ul a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-col ul a:hover { color: var(--gold-light); }
  .footer-bottom {
    max-width: 1100px;
    margin: 0 auto;
    padding-top: 2rem;
    border-top: 1px solid var(--navy-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
    gap: 1rem;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .hero { padding: 5rem 1.25rem 3rem; min-height: auto; }
    section { padding: 3.5rem 1.25rem; }
    .budget-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
    .stat-item { padding: 1rem; }
    .stat-number { font-size: 26px; }
    .audit-table { font-size: 12px; }
    .audit-table td, .audit-table th { padding: 10px 10px; }
  }

  @media (max-width: 480px) {
    .footer-grid { grid-template-columns: 1fr; }
    .hero-cta { flex-direction: column; }
    .btn-primary, .btn-ghost { text-align: center; }
  }

  /* PROPOSED PROJECTS */
  .projects-section { background: var(--navy); }
  .project-accordion { display: flex; flex-direction: column; gap: 12px; margin-top: 2.5rem; }
  .project-item {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .project-item.open { border-color: rgba(201,168,76,0.5); }
  .project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }
  .project-header:hover .project-title { color: var(--gold-light); }
  .project-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .project-number {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--gold); flex-shrink: 0;
  }
  .project-title { font-size: 15px; font-weight: 500; color: var(--white); }
  .project-category {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 10px; border-radius: 99px;
    background: rgba(255,255,255,0.06); color: var(--text-muted);
  }
  .project-header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .project-budget-preview { font-size: 13px; color: var(--gold); font-weight: 500; }
  .project-chevron {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: transform 0.25s;
  }
  .project-item.open .project-chevron { transform: rotate(180deg); color: var(--gold); }
  .project-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s ease;
    padding: 0 1.5rem;
  }
  .project-item.open .project-body { max-height: 600px; padding: 0 1.5rem 1.5rem; }
  .project-description {
    font-size: 13px; color: var(--text-soft); line-height: 1.7;
    padding: 1rem 0; border-bottom: 1px solid var(--navy-border); margin-bottom: 1rem;
  }
  .budget-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .budget-col {
    background: rgba(255,255,255,0.03); border-radius: 6px;
    padding: 1rem 1.25rem; border: 1px solid var(--navy-border);
  }
  .budget-col-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .budget-col-amount { font-size: 22px; font-weight: 600; font-family: var(--serif); }
  .budget-col-amount.proposed { color: var(--gold); }
  .budget-col-amount.actual { color: var(--success); }
  .budget-col-amount.pending { color: var(--text-muted); font-size: 14px; font-weight: 400; }
  .budget-col-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .budget-variance {
    margin-top: 10px; font-size: 12px; padding: 6px 10px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .budget-variance.under { background: rgba(62,207,142,0.1); color: var(--success); }
  .budget-variance.over { background: rgba(245,166,35,0.1); color: var(--warning); }
  .budget-variance.pending-var { background: rgba(255,255,255,0.05); color: var(--text-muted); }
  @media (max-width: 600px) {
    .budget-compare { grid-template-columns: 1fr; }
    .project-header-right .project-budget-preview { display: none; }
  }


  /* ── LIVE CALC INPUTS ── */
  .editable-num {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(201,168,76,0.5);
    color: inherit;
    font-size: inherit;
    font-weight: inherit;
    font-family: inherit;
    width: auto;
    min-width: 60px;
    max-width: 140px;
    text-align: right;
    outline: none;
    padding: 0 2px;
    cursor: text;
  }
  .editable-num:focus { border-bottom-color: var(--gold); color: var(--gold); }
  .calc-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 12px;
    font-style: italic;
  }
  .bar-amt-wrap { display:flex; align-items:center; gap:4px; justify-content:flex-end; }
  .variance-tag {
    display:inline-block; font-size:11px; font-weight:600;
    padding: 3px 10px; border-radius:99px; margin-top:8px;
  }
  .variance-under { background: rgba(62,207,142,0.1); color: var(--success); }
  .variance-over  { background: rgba(245,166,35,0.1);  color: var(--warning); }
  .variance-even  { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .variance-pending { background: rgba(255,255,255,0.05); color: var(--text-muted); }

<hr class="divider" />

<!-- BUDGET SECTION -->
<section class="budget-section" id="budget">
  <div class="container">
    <p class="section-eyebrow">Budget breakdown</p>
    <h2 class="section-title">Where the funds go</h2>
    <p class="section-desc">All student government allocations for Academic Year 2025-2026, broken down by department and program.</p>
   
    <div class="budget-grid">

      <!-- LEFT: EDITABLE DEPARTMENT BARS -->
      <div class="budget-bars">

        <div class="bar-row">
          <div class="bar-dept">Events</div>
          <div class="bar-track"><div class="bar-fill" id="bar-events" style="width:0%;background:#c9a84c;transition:width .5s;"></div></div>
          <div class="bar-amt-wrap" style="color:var(--text-soft);font-size:12px;">₱<span id="alloc-events-display">165,000</span></div>
        </div>

        <div class="bar-row">

<script>
  // ── Project accordion ──────────────────────────────────────────────────────
  function toggleProject(el) {
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.project-item').forEach(p => p.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
  }

  // ── Formatting helpers ─────────────────────────────────────────────────────
  function peso(n) {
    if (n >= 1000000) return '₱' + (n/1000000).toFixed(2) + 'M';
    return '₱' + Number(n).toLocaleString('en-PH');
  }
  function pesoShort(n) {
    if (n >= 1000000) return '₱' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return '₱' + (n/1000).toFixed(0) + 'K';
    return '₱' + n;
  }
  function val(id) { return parseFloat(document.getElementById(id).value) || 0; }
  function set(id, txt) { const el = document.getElementById(id); if(el) el.textContent = txt; }

  // ── Department bar colours ─────────────────────────────────────────────────
  const DEPTS = [
    { id:'events',     color:'#c9a84c' },
    { id:'academics',  color:'#4a9eff' },
    { id:'operations', color:'#a78bfa' },
    { id:'outreach',   color:'#3ecf8e' },
    { id:'reserves',   color:'rgba(255,255,255,.3)' },
  ];

  // ── Main recalc ────────────────────────────────────────────────────────────
  // ── Fixed budget allocations (edit these values to update the site) ──────────
  const ALLOC = { events:165000, academics:90000, operations:20000, outreach:55000, reserves:120000 };

  function recalc() {
    // --- dept totals (from fixed values) ---
    let total = 0;
    DEPTS.forEach(d => { total += ALLOC[d.id] || 0; });

    // --- department bars ---
    DEPTS.forEach(d => {
      const v = ALLOC[d.id] || 0;
      const pct = total > 0 ? Math.round(v / total * 100) : 0;
      const bar = document.getElementById('bar-' + d.id);
      if (bar) bar.style.width = pct + '%';
    });

    // --- total alloc display ---
    set('total-alloc-display', peso(total));
    set('sum-total', peso(total));
    set('sum-bar-max', peso(total));

    // --- spent / remaining / pct ---
    const spent = currentSpent;
    const remaining = total - spent;
    const pct = total > 0 ? (spent / total * 100) : 0;

    // Update disbursed display
    set('sum-disbursed', peso(spent));

    // Update remaining balance
    set('sum-remaining', peso(remaining));
    document.getElementById('sum-remaining').style.color =
      remaining < 0 ? 'var(--warning)' : 'var(--success)';

    set('sum-pct', pct.toFixed(2) + '%');
    set('sum-bar-label', pct.toFixed(2) + '% utilized');

    const barEl = document.getElementById('sum-bar');
    if (barEl) {
      barEl.style.width = Math.min(pct, 100) + '%';
      barEl.style.background = pct > 100
        ? 'linear-gradient(90deg,#f5a623,#e85555)'
        : 'linear-gradient(90deg,#c9a84c,#e8c97a)';
    }

    // --- stat bar ---
    set('stat-budget', pesoShort(total));
    set('stat-spent',  pesoShort(spent));
    set('stat-pct',    pct.toFixed(2) + '%');

    // --- project variances ---
    recalcProjects();
  }

  // ── Project proposed-vs-actual variance ────────────────────────────────────
  function recalcProjects() {
    document.querySelectorAll('.project-item').forEach(item => {
      const propInput = item.querySelector('.proj-proposed');
      const actInput  = item.querySelector('.proj-actual');
      const varTag    = item.querySelector('.proj-variance');
      const previewEl = item.querySelector('.project-budget-preview');

      if (!propInput || !varTag) return;

      const proposed = parseFloat(propInput.value) || 0;

      // update header preview
      if (previewEl) previewEl.textContent = peso(proposed);

      if (!actInput || actInput.value.trim() === '' || isNaN(parseFloat(actInput.value))) {
        varTag.textContent = '⏳ Pending completion';
        varTag.className = 'variance-tag variance-pending';
        return;
      }

      const actual = parseFloat(actInput.value) || 0;
      const diff   = proposed - actual;

      if (diff > 0) {
        varTag.textContent = '↓ ' + peso(diff) + ' under budget';
        varTag.className = 'variance-tag variance-under';
      } else if (diff < 0) {
        varTag.textContent = '↑ ' + peso(Math.abs(diff)) + ' over budget';
        varTag.className = 'variance-tag variance-over';
      } else {
        varTag.textContent = '✓ Exactly on budget';
        varTag.className = 'variance-tag variance-even';
      }
    });
  }


  // ── ADMIN PASSWORD & PANEL ────────────────────────────────────────────────
  const ADMIN_PASSWORD = 'SJAG_2627Otres_PPP'; // ← Change this to your password

  function openAdmin() {
    document.getElementById('admin-overlay').classList.add('show');
    document.getElementById('pw-modal').style.display = 'block';
    document.getElementById('admin-modal').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  }

  function checkPw() {
    const entered = document.getElementById('pw-input').value;
    if (entered === ADMIN_PASSWORD) {
      // Sync editor fields with current ALLOC values
      document.getElementById('edit-events').value     = ALLOC.events;
      document.getElementById('edit-academics').value  = ALLOC.academics;
      document.getElementById('edit-operations').value = ALLOC.operations;
      document.getElementById('edit-outreach').value   = ALLOC.outreach;
      document.getElementById('edit-reserves').value   = ALLOC.reserves;
      document.getElementById('edit-spent').value      = currentSpent;
      // Show editor
      document.getElementById('pw-modal').style.display   = 'none';
      document.getElementById('admin-modal').style.display = 'block';
      document.getElementById('admin-lock-btn').classList.add('unlocked');
      document.getElementById('admin-lock-btn').textContent = '🔓 Admin';
    } else {
      document.getElementById('pw-error').textContent = 'Incorrect password. Try again.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function closeAdmin() {
    document.getElementById('admin-overlay').classList.remove('show');
    document.getElementById('admin-lock-btn').classList.remove('unlocked');
    document.getElementById('admin-lock-btn').textContent = '🔒 Admin';
  }

  function saveAdmin() {
    // Read new values from editor
    ALLOC.events     = parseFloat(document.getElementById('edit-events').value)     || 0;
    ALLOC.academics  = parseFloat(document.getElementById('edit-academics').value)  || 0;
    ALLOC.operations = parseFloat(document.getElementById('edit-operations').value) || 0;
    ALLOC.outreach   = parseFloat(document.getElementById('edit-outreach').value)   || 0;
    ALLOC.reserves   = parseFloat(document.getElementById('edit-reserves').value)   || 0;
    currentSpent     = parseFloat(document.getElementById('edit-spent').value)      || 0;

    // Update static display spans in bar rows
    const fmt = n => Number(n).toLocaleString('en-PH');
    ['events','academics','operations','outreach','reserves'].forEach(d => {
      const el = document.getElementById('alloc-' + d + '-display');
      if (el) el.textContent = fmt(ALLOC[d]);
    });

    // Re-run dashboard calc
    recalc();
    closeAdmin();
  }

  // Track spent as a variable so admin can update it
  let currentSpent = 100;

  // ── Boot ───────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', recalc);
</script>


<!-- ── ADMIN LOCK BUTTON ── -->
<button id="admin-lock-btn" onclick="openAdmin()">🔒 Admin</button>

<!-- ── OVERLAY ── -->
<div id="admin-overlay">

  <!-- Password modal -->
  <div id="pw-modal">
    <h3>🔐 Admin Access</h3>
    <p>Enter your password to edit budget figures.</p>
    <input id="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
    <div id="pw-error"></div>
    <button id="pw-submit" onclick="checkPw()">Unlock</button>
  </div>

  <!-- Budget editor modal (hidden until password correct) -->
  <div id="admin-modal" style="display:none;">
    <h3>✏️ Edit Budget Figures</h3>
    <p>Update any amount below. Click Save to apply changes to the dashboard.</p>

    <div class="admin-input-row">
      <span class="admin-input-label">Events</span>
      <input class="admin-input-field" id="edit-events" type="number" value="165000" min="0" />
    </div>
    <div class="admin-input-row">
      <span class="admin-input-label">Academics</span>
      <input class="admin-input-field" id="edit-academics" type="number" value="90000" min="0" />
    </div>
    <div class="admin-input-row">
      <span class="admin-input-label">Operations</span>
      <input class="admin-input-field" id="edit-operations" type="number" value="20000" min="0" />
    </div>
    <div class="admin-input-row">
      <span class="admin-input-label">Outreach</span>
      <input class="admin-input-field" id="edit-outreach" type="number" value="55000" min="0" />
    </div>
    <div class="admin-input-row">
      <span class="admin-input-label">Reserves</span>
      <input class="admin-input-field" id="edit-reserves" type="number" value="120000" min="0" />
    </div>
    <div class="admin-input-row">
      <span class="admin-input-label">Total Disbursed</span>
      <input class="admin-input-field" id="edit-spent" type="number" value="100" min="0" />
    </div>

    <div class="admin-btn-row">
      <button class="admin-btn-cancel" onclick="closeAdmin()">Cancel</button>
      <button class="admin-btn-save" onclick="saveAdmin()">Save & Update</button>
    </div>
  </div>

</div>

</body>
</html>
